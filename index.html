<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City Builder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏙️</text></svg>">
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="game-container"></div>

  <!-- UI overlays rendered on top of canvas -->
  <div id="info-panel" class="hidden">
    <div id="info-panel-title">Tile Info</div>
    <div id="info-panel-body"></div>
  </div>

  <div id="notification" class="hidden"></div>

  <!-- Debug hover tooltip (active when ?debug in URL) -->
  <div id="debug-tooltip" class="hidden"></div>

  <!-- Drag-to-build cost tooltip -->
  <div id="drag-info" class="hidden">
    <span id="drag-info-text"></span>
  </div>

  <!-- Debug stats panel -->
  <div id="debug-panel">
    <div id="debug-title">Debug <button id="debug-close">✕</button></div>
    <div id="debug-body"></div>
  </div>
  <button id="debug-toggle">🔧 Debug</button>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-header-row">
        <span id="modal-header"></span>
        <button id="modal-close" onclick="document.getElementById('modal-overlay').classList.add('hidden')">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toolbar">
    <div class="toolbar-group" id="group-rci">
      <span class="toolbar-label">Demand</span>
      <div class="rci-bars">
        <div class="rci-bar-wrap" id="rci-bar-r" title="R: 50%">
          <span>R</span>
          <div class="rci-track"><div class="rci-fill rci-r" id="rci-r" style="height:50%"></div></div>
        </div>
        <div class="rci-bar-wrap" id="rci-bar-c" title="C: 30%">
          <span>C</span>
          <div class="rci-track"><div class="rci-fill rci-c" id="rci-c" style="height:30%"></div></div>
        </div>
        <div class="rci-bar-wrap" id="rci-bar-i" title="I: 20%">
          <span>I</span>
          <div class="rci-track"><div class="rci-fill rci-i" id="rci-i" style="height:20%"></div></div>
        </div>
      </div>
    </div>
    <div class="toolbar-group">
      <span class="toolbar-label">Zones</span>
      <button data-tool="zone" data-zone="R" class="btn-zone-r" title="Residential Zone | Cost: 200 | Upkeep: 10/mo">R Zone</button>
      <button data-tool="zone" data-zone="C" class="btn-zone-c" title="Commercial Zone | Cost: 300 | Upkeep: 15/mo">C Zone</button>
      <button data-tool="zone" data-zone="I" class="btn-zone-i" title="Industrial Zone | Cost: 400 | Upkeep: 20/mo">I Zone</button>
    </div>
    <div class="toolbar-group" id="group-services">
      <span class="toolbar-label">Services</span>
      <button data-tool="building" data-building="police_station"   title="Police Station | Cost: 1500 | Upkeep: 200/mo">Police</button>
      <button data-tool="building" data-building="fire_station"     title="Fire Station | Cost: 1500 | Upkeep: 200/mo">Fire</button>
      <button data-tool="building" data-building="hospital"         title="Hospital | Cost: 3000 | Upkeep: 400/mo | Lvl 2" class="locked">Hospital</button>
      <button data-tool="building" data-building="primary_school"   title="Primary School | Cost: 1000 | Upkeep: 150/mo">School</button>
      <button data-tool="building" data-building="high_school"      title="High School | Cost: 2000 | Upkeep: 250/mo | Lvl 2" class="locked">H.School</button>
      <button data-tool="building" data-building="university"       title="University | Cost: 5000 | Upkeep: 600/mo | Lvl 3" class="locked">Uni</button>
    </div>
    <div class="toolbar-group" id="group-leisure">
      <span class="toolbar-label">Leisure</span>
      <button data-tool="building" data-building="park_small"       title="Small Park | Cost: 1000 | Upkeep: 200/mo | +8 happiness">🌳 Park S</button>
      <button data-tool="building" data-building="park_medium"      title="Medium Park | Cost: 3000 | Upkeep: 500/mo | Lvl 2 | +10 happiness" class="locked">🌲 Park M</button>
      <button data-tool="building" data-building="park_large"       title="Large Park | Cost: 8000 | Upkeep: 1200/mo | Lvl 3 | +20 happiness" class="locked">🌲🌲 Park L</button>
      <button data-tool="building" data-building="tennis_court"     title="Tennis Court | Cost: 2000 | Upkeep: 200/mo | +8 happiness">🎾 Tennis</button>
      <button data-tool="building" data-building="football_field"   title="Football Field | Cost: 4000 | Upkeep: 400/mo | Lvl 2 | +14 happiness" class="locked">⚽ Football</button>
    </div>
    <div class="toolbar-group">
      <span class="toolbar-label">Infra</span>
      <button data-tool="building" data-building="road"         title="Road | Cost: 50/tile | No upkeep">Road</button>
      <button data-tool="building" data-building="power_plant"  title="Power Plant | Cost: 2000 | Upkeep: 300/mo | 100 kW">Power Plant</button>
      <button data-tool="building" data-building="water_pump"   title="Water Pump | Cost: 1500 | Upkeep: 200/mo | 80 units">Water Pump</button>
    </div>
    <div class="toolbar-group" id="group-heatmap">
      <span class="toolbar-label">View</span>
    </div>
    <div class="toolbar-group">
      <span class="toolbar-label">Tools</span>
      <button data-tool="demolish" title="Demolish | Remove building or road">Demolish</button>
      <button data-tool="select"   title="Select | View tile info" class="active">Select</button>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="bottom-left">
      <div class="stat" id="stat-money">💰 €20,000</div>
      <div class="stat" id="stat-monthly">📈 €0/mo</div>
      <div class="stat" id="stat-pop">👥 0</div>
      <div class="stat" id="stat-power">⚡ 0/0 kW</div>
      <div class="stat" id="stat-water">💧 0/0</div>
      <div class="stat" id="stat-happiness">😊 50%</div>
    </div>
    <div id="bottom-right">
      <div id="city-name-wrap">
        <span id="city-name-display">My City</span>
        <button id="btn-edit-city-name" title="Edit city name">✏️</button>
      </div>
      <div class="stat" id="stat-level" style="cursor:pointer;">🏙️ Lvl 1</div>
      <div class="stat" id="stat-date">📅 Day 1</div>
      <div id="speed-controls">
        <button id="btn-pause" title="Pause/Resume (Space)">⏸</button>
        <button id="btn-speed-1" class="speed-btn active" title="Normal speed">1×</button>
        <button id="btn-speed-2" class="speed-btn" title="Fast">2×</button>
        <button id="btn-speed-4" class="speed-btn" title="Very fast">4×</button>
      </div>
    </div>
  </div>

  <!-- Pause menu overlay -->
  <div id="pause-overlay" class="hidden">
    <div id="pause-panel">
      <div id="pause-title">🏙️ CityBuilder</div>
      <div id="pause-subtitle">PAUSED</div>
      <div class="pause-divider"></div>
      <button id="btn-save-expand" class="pause-btn">💾 Save Game ▾</button>
      <div id="save-slots" class="slot-picker hidden"></div>
      <button id="btn-save-file" class="pause-btn pause-secondary">⬇ Download Save</button>
      <button id="btn-load-expand" class="pause-btn">📂 Load Game ▾</button>
      <div id="load-slots" class="slot-picker hidden"></div>
      <button id="btn-load-file" class="pause-btn pause-secondary">⬆ Upload Save</button>
      <input id="save-file-input" type="file" accept=".json" style="display:none">
      <div class="pause-divider"></div>
      <button id="btn-resume" class="pause-btn pause-primary">▶ Resume</button>
      <button id="btn-new-game" class="pause-btn">🔄 New Game</button>
      <div id="new-game-confirm" class="hidden pause-confirm">
        <p>Start a new game? All unsaved progress will be lost.</p>
        <button id="btn-new-game-confirm" class="pause-btn pause-danger">Confirm New Game</button>
        <button id="btn-new-game-cancel" class="pause-btn">Cancel</button>
      </div>
      <div class="pause-divider"></div>
      <div class="pause-section" id="settings-section">
        <h3>⚙️ Settings</h3>
        <label class="setting-row">
          <span>🚗 Traffic side</span>
          <button id="btn-traffic-side" class="setting-toggle">🇺🇸 Drive right</button>
        </label>
      </div>
      <div class="pause-divider"></div>
      <div id="pause-footer">Press Esc to resume</div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
